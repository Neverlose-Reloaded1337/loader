<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>who are you?</title>
<style>
:root {
  color-scheme: light;
  --bg: #f7f7f7;
  --panel: #ffffff;
  --panel-soft: #eeeeee;
  --line: #d9d9d9;
  --line-strong: #8d8d8d;
  --text: #111111;
  --muted: #5c5c5c;
  --faint: #8a8a8a;
  --accent: #111111;
  --accent-2: #3d3d3d;
  --accent-text: #ffffff;
  --code: #f1f1f1;
  --shadow: 0 18px 45px rgba(0, 0, 0, .07);
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0f0f0f;
  --panel: #171717;
  --panel-soft: #202020;
  --line: #303030;
  --line-strong: #737373;
  --text: #f4f4f4;
  --muted: #b7b7b7;
  --faint: #838383;
  --accent: #f4f4f4;
  --accent-2: #c8c8c8;
  --accent-text: #0f0f0f;
  --code: #1d1d1d;
  --shadow: 0 20px 55px rgba(0, 0, 0, .32);
}
* { box-sizing: border-box; }
html { min-width: 320px; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}
button, input { font: inherit; letter-spacing: 0; }
.page { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 36px 0 64px; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
.brand { display: flex; align-items: center; min-width: 0; }
h1 { margin: 0; font-size: clamp(22px, 4vw, 34px); line-height: 1.05; font-weight: 650; }
.subtle { color: var(--muted); font-size: 13px; margin-top: 6px; }
.theme-btn {
  width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--line);
  background: var(--panel); color: var(--text); cursor: pointer;
  display: inline-grid; place-items: center; padding: 0;
}
.theme-btn svg { width: 17px; height: 17px; display: block; }
.theme-btn:hover { border-color: var(--line-strong); }
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; align-items: start; }
.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  padding: 20px; box-shadow: var(--shadow);
}
.span-5 { grid-column: span 5; }
.span-7 { grid-column: span 7; }
.span-6 { grid-column: span 6; }
.span-12 { grid-column: span 12; }
.label { color: var(--faint); text-transform: uppercase; font-size: 11px; font-weight: 700; margin-bottom: 14px; }
.row { display: flex; gap: 10px; align-items: center; }
.stack { display: grid; gap: 10px; }
input[type="text"] {
  width: 100%; border: 1px solid var(--line); border-radius: 8px; outline: none;
  background: var(--panel-soft); color: var(--text); padding: 11px 12px;
}
input:focus { border-color: var(--line-strong); background: var(--panel); }
input::placeholder { color: var(--faint); }
.btn, .pill, .link-btn {
  border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: opacity .16s ease, border-color .16s ease, background .16s ease;
}
.btn { width: 100%; background: var(--accent); color: var(--accent-text); padding: 11px 12px; font-weight: 700; }
.btn:hover, .pill:hover, .link-btn:hover { opacity: .84; }
.btn:disabled, .pill:disabled, .link-btn:disabled { opacity: .45; cursor: default; }
.pill { background: var(--panel-soft); color: var(--text); border-color: var(--line); padding: 7px 11px; }
.link-btn { background: transparent; color: var(--accent); padding: 0; }
.link-btn.danger { color: var(--accent-2); }
.log, .import-out, .code {
  background: var(--code); border: 1px solid var(--line); border-radius: 8px;
  color: var(--muted); word-break: break-word; white-space: pre-wrap;
}
.log { min-height: 84px; padding: 12px; font-size: 12px; }
.import-out { min-height: 128px; max-height: 280px; overflow: auto; padding: 12px; font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace; }
.avatar-row { display: flex; gap: 14px; align-items: center; }
.avatar { width: 74px; height: 74px; border-radius: 0; object-fit: cover; border: none; background: transparent; flex: 0 0 auto; }
.name { font-weight: 700; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.list { display: grid; gap: 8px; }
.empty { color: var(--faint); font-size: 13px; }
.item {
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--line);
}
.item:last-child { border-bottom: 0; padding-bottom: 0; }
.item-name { font-weight: 650; }
.item-meta { color: var(--faint); font-size: 12px; margin-top: 2px; }
.code { margin-top: 7px; padding: 6px 8px; font: 12px ui-monospace, SFMono-Regular, Consolas, monospace; user-select: all; cursor: pointer; }
.meta { display: none; color: var(--faint); font-size: 12px; margin: 4px 0 0; }
.meta.on { display: block; }
input[type="file"] { display: none; }
.profile-discord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; grid-column: span 12; align-items: stretch; }
.profile-discord-row .card { height: 100%; }
.discord-card { display: flex; flex-direction: column; }
.discord-card .discord-link { margin-top: auto; margin-bottom: auto; }
.discord-link {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 16px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--panel-soft);
  text-decoration: none; color: var(--text);
  transition: border-color .16s ease, background .16s ease;
  margin-top: 4px;
}
.discord-link:hover { border-color: var(--line-strong); background: var(--panel); }
.discord-icon { width: 44px; height: 34px; flex: 0 0 44px; overflow: hidden; display: block; }
.discord-icon path { fill: var(--text); }
.discord-text { flex: 1; min-width: 0; }
.discord-title { font-weight: 700; font-size: 15px; }
.discord-sub { color: var(--faint); font-size: 12px; margin-top: 2px; }
.discord-arrow { width: 16px; height: 16px; flex: 0 0 auto; color: var(--faint); stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
@media (max-width: 760px) {
  .page { width: min(100% - 24px, 1080px); padding-top: 24px; }
  .grid { grid-template-columns: 1fr; }
  .span-5, .span-7, .span-6, .span-12 { grid-column: span 1; }
  .card { padding: 16px; }
  .topbar { align-items: flex-start; }
  .profile-discord-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <div class="brand">
      <div>
        <h1>who are you?</h1>
        <div class="subtle">single-user control panel for nl-reloaded</div>
      </div>
    </div>
    <button class="theme-btn" id="themeBtn" title="toggle theme" aria-label="toggle theme"></button>
  </header>

  <section class="grid">
    <div class="profile-discord-row">
    <div class="card">
      <div class="label">profile</div>
      <div class="avatar-row">
        <img class="avatar" id="avatarPreview" src="/api/getavatar" alt="avatar">
        <div>
          <div class="name" id="profileName">nl-reloaded</div>
          <div class="subtle">always active, no login required</div>
        </div>
      </div>
    </div>

    <div class="card discord-card">
      <div class="label">community</div>
      <a href="https://dsc.gg/nlreloaded" target="_blank" rel="noopener noreferrer" class="discord-link">
        <svg class="discord-icon" viewBox="0 0 71 55" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M60.1045 4.8978C55.5792 2.8214 50.7265 1.2916 45.6527 0.41542C45.5603 0.39851 45.468 0.44077 45.4204 0.52529C44.7963 1.6353 44.105 3.0834 43.6209 4.2216C38.1637 3.4046 32.7345 3.4046 27.3892 4.2216C26.905 3.0581 26.1886 1.6353 25.5617 0.52529C25.5141 0.44359 25.4218 0.40133 25.3294 0.41542C20.2584 1.2888 15.4057 2.8186 10.8776 4.8978C10.8384 4.9147 10.8048 4.9429 10.7825 4.9795C1.57795 18.7309 -0.943561 32.1443 0.293408 45.3914C0.299005 45.4562 0.335386 45.5182 0.385761 45.5576C6.45866 50.0174 12.3413 52.7249 18.1147 54.5195C18.2071 54.5477 18.305 54.5139 18.3638 54.4378C19.7295 52.5728 20.9469 50.6063 21.9907 48.5383C22.0523 48.4172 21.9935 48.2735 21.8676 48.2256C19.9366 47.4931 18.0979 46.6 16.3292 45.5858C16.1893 45.5041 16.1781 45.304 16.3068 45.2082C16.679 44.9293 17.0513 44.6391 17.4067 44.3461C17.471 44.2926 17.5606 44.2813 17.6362 44.3151C29.2558 49.6202 41.8354 49.6202 53.3179 44.3151C53.3935 44.2785 53.4831 44.2898 53.5502 44.3433C53.9057 44.6363 54.2779 44.9293 54.6529 45.2082C54.7816 45.304 54.7732 45.5041 54.6333 45.5858C52.8646 46.6197 51.0259 47.4931 49.0921 48.2228C48.9662 48.2707 48.9102 48.4172 48.9718 48.5383C50.038 50.6034 51.2554 52.5699 52.5959 54.435C52.6519 54.5139 52.7526 54.5477 52.845 54.5195C58.6464 52.7249 64.529 50.0174 70.6019 45.5576C70.6551 45.5182 70.6887 45.459 70.6943 45.3942C72.1747 30.0791 68.2147 16.7757 60.1968 4.9823C60.1772 4.9429 60.1437 4.9147 60.1045 4.8978ZM23.7259 37.3253C20.2276 37.3253 17.3451 34.1136 17.3451 30.1693C17.3451 26.225 20.1717 23.0133 23.7259 23.0133C27.308 23.0133 30.1626 26.2532 30.1066 30.1693C30.1066 34.1136 27.28 37.3253 23.7259 37.3253ZM47.3178 37.3253C43.8196 37.3253 40.9371 34.1136 40.9371 30.1693C40.9371 26.225 43.7636 23.0133 47.3178 23.0133C50.9 23.0133 53.7545 26.2532 53.6986 30.1693C53.6986 34.1136 50.9 37.3253 47.3178 37.3253Z"/>
        </svg>
        <div class="discord-text">
          <div class="discord-title">join our discord</div>
          <div class="discord-sub">dsc.gg/nlreloaded</div>
        </div>
        <svg class="discord-arrow" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
    </div>

    <div class="card span-6">
      <div class="label">your items</div>
      <div class="list" id="itemsContainer"><div class="empty">loading items</div></div>
    </div>

    <div class="card span-6">
      <div class="label">your shares</div>
      <div class="list" id="sharesContainer"><div class="empty">no shares yet</div></div>
    </div>

    <div class="card span-12">
      <div class="label">import shared item</div>
      <div class="stack">
        <input type="text" id="importCode" placeholder="paste share code">
        <button class="btn" id="importBtn">fetch</button>
        <div class="meta" id="importMeta"></div>
        <div class="import-out" id="importOut">paste a code above and hit fetch</div>
        <div class="actions" id="importActions" style="display:none">
          <button class="pill" id="importCopyBtn">copy content</button>
          <button class="pill" id="importToAccountBtn">add to my list</button>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
(() => {
  'use strict';

  const $ = id => document.getElementById(id);
  const themeBtn = $('themeBtn');
  const avatarPreview = $('avatarPreview');
  const profileName = $('profileName');
  const importCodeEl = $('importCode');
  const importBtn = $('importBtn');
  const importMeta = $('importMeta');
  const importOut = $('importOut');
  const importActions = $('importActions');
  const importCopyBtn = $('importCopyBtn');
  const importToAccountBtn = $('importToAccountBtn');

  let lastImportContent = '';
  let pendingShareCode = '';
  let dark = localStorage.getItem('nl_theme') === 'dark' ||
    (!localStorage.getItem('nl_theme') && matchMedia('(prefers-color-scheme: dark)').matches);

  const setOutput = value => {
    console.log(typeof value === 'string' ? value : JSON.stringify(value, null, 2));
  };

  const applyTheme = () => {
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    themeBtn.innerHTML = dark
      ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20.2 15.6a8.8 8.8 0 0 1-11.8-12A9.4 9.4 0 1 0 20.2 15.6Z"/></svg>'
      : '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0-5 1 3h-2l1-3Zm0 17 1 3h-2l1-3ZM4.2 3.5l2.8 1.4-1.4 1.4-1.4-2.8Zm14.2 14.2 1.4 2.8-2.8-1.4 1.4-1.4ZM2 12l3-1v2l-3-1Zm17 0 3-1v2l-3-1ZM5.6 17.7 7 19.1l-2.8 1.4 1.4-2.8ZM18.4 6.3 17 4.9l2.8-1.4-1.4 2.8Z"/></svg>';
    themeBtn.setAttribute('aria-label', dark ? 'switch to light theme' : 'switch to dark theme');
    themeBtn.title = dark ? 'switch to light theme' : 'switch to dark theme';
    localStorage.setItem('nl_theme', dark ? 'dark' : 'light');
  };

  const avatarUrl = () => '/api/getavatar?ts=' + Date.now();
  const syncAvatar = () => {
    avatarPreview.src = avatarUrl();
  };

  const copyText = async text => {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch {
      return false;
    }
  };

  const shareUrl = code => location.origin + location.pathname + '?share=' + encodeURIComponent(code);

  const shareCodeFromLocation = () => {
    const params = new URLSearchParams(location.search);
    return (params.get('share') || params.get('code') || '').trim();
  };

  const normalizeShareCode = value => {
    const raw = value.trim();
    if (!raw) return '';
    try {
      const url = new URL(raw);
      return (url.searchParams.get('share') || url.searchParams.get('code') || '').trim();
    } catch {
      return raw;
    }
  };

  const apiJson = async (path, options = {}) => {
    const res = await fetch(path, {
      ...options,
      headers: { 'content-type': 'application/json', ...(options.headers || {}) },
    });
    const data = await res.json().catch(() => ({ error: 'invalid response' }));
    if (!res.ok) throw Object.assign(new Error(data.error || 'request failed'), { data, status: res.status });
    return data;
  };

  const refreshMe = async () => {
    try {
      const data = await apiJson('/api/me');
      profileName.textContent = data.username;
      syncAvatar();
      loadItems();
      loadShares();
    } catch (e) {
      profileName.textContent = 'nl-reloaded';
      syncAvatar();
      setOutput(e.data || e.message);
      loadItems();
      loadShares();
    }
  };

  const loadItems = async () => {
    const el = $('itemsContainer');
    try {
      const data = await apiJson('/api/items');
      const all = [
        ...data.scripts.map(item => ({ ...item, type: 'Script' })),
        ...data.configs.map(item => ({ ...item, type: 'Config' })),
        ...data.styles.map(item => ({ ...item, type: 'Style' })),
      ];
      if (!all.length) {
        el.innerHTML = '<div class="empty">no items yet</div>';
        return;
      }
      el.innerHTML = '';
      for (const item of all) {
        const row = document.createElement('div');
        row.className = 'item';
        const left = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'item-name';
        name.textContent = item.name || 'untitled';
        const meta = document.createElement('div');
        meta.className = 'item-meta';
        meta.textContent = item.type;
        left.append(name, meta);
        const share = document.createElement('button');
        share.className = 'link-btn';
        share.textContent = 'share';
        share.addEventListener('click', () => doShare(share, item.type, item.id));
        row.append(left, share);
        el.appendChild(row);
      }
    } catch {
      el.innerHTML = '<div class="empty">error loading items</div>';
    }
  };

  const loadShares = async () => {
    const el = $('sharesContainer');
    try {
      const data = await apiJson('/api/myshares');
      if (!data.shares.length) {
        el.innerHTML = '<div class="empty">no shares yet</div>';
        return;
      }
      el.innerHTML = '';
      for (const share of data.shares) {
        const row = document.createElement('div');
        row.className = 'item';
        const left = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'item-name';
        name.textContent = share.item_name || 'untitled';
        const meta = document.createElement('div');
        meta.className = 'item-meta';
        meta.textContent = share.item_type;
        const code = document.createElement('div');
        code.className = 'code';
        code.textContent = share.share_code;
        code.addEventListener('click', () => copyText(shareUrl(share.share_code)));
        left.append(name, meta, code);
        const revoke = document.createElement('button');
        revoke.className = 'link-btn danger';
        revoke.textContent = 'revoke';
        revoke.addEventListener('click', () => doRevoke(revoke, share.share_code));
        row.append(left, revoke);
        el.appendChild(row);
      }
    } catch {
      el.innerHTML = '<div class="empty">error loading shares</div>';
    }
  };

  const doShare = async (btn, itemType, itemId) => {
    btn.disabled = true;
    const old = btn.textContent;
    btn.textContent = 'sharing';
    try {
      const data = await apiJson('/api/share', {
        method: 'POST',
        body: JSON.stringify({ item_type: itemType, item_id: itemId }),
      });
      const link = data.share_url || shareUrl(data.share_code);
      const copied = await copyText(link);
      setOutput('share link: ' + link + (copied ? '\ncopied to clipboard' : ''));
      loadShares();
    } catch (e) {
      setOutput(e.data || e.message);
    } finally {
      btn.textContent = old;
      btn.disabled = false;
    }
  };

  const doRevoke = async (btn, shareCode) => {
    btn.disabled = true;
    const old = btn.textContent;
    btn.textContent = 'revoking';
    try {
      await apiJson('/api/unshare', {
        method: 'POST',
        body: JSON.stringify({ share_code: shareCode }),
      });
      setOutput('share revoked');
      loadShares();
    } catch (e) {
      setOutput(e.data || e.message);
    } finally {
      btn.textContent = old;
      btn.disabled = false;
    }
  };

  importBtn.addEventListener('click', async () => {
    const code = normalizeShareCode(importCodeEl.value);
    importCodeEl.value = code;
    if (!code) {
      importOut.textContent = 'enter a share code first';
      return;
    }
    importBtn.disabled = true;
    importBtn.textContent = 'fetching';
    importActions.style.display = 'none';
    importMeta.className = 'meta';
    try {
      const data = await apiJson('/api/shared/' + encodeURIComponent(code));
      lastImportContent = data.content || '';
      importMeta.textContent = data.type + ' / ' + data.name;
      importMeta.className = 'meta on';
      importOut.textContent = lastImportContent || '(empty)';
      importActions.style.display = 'flex';
    } catch (e) {
      importOut.textContent = e.data?.error || e.message;
    } finally {
      importBtn.textContent = 'fetch';
      importBtn.disabled = false;
    }
  });

  const importToAccount = async code => {
    const shareCode = normalizeShareCode(code);
    if (!shareCode) {
      setOutput('paste a share code first');
      return false;
    }
    importToAccountBtn.disabled = true;
    try {
      await apiJson('/api/import_to_account', {
        method: 'POST',
        body: JSON.stringify({ share_code: shareCode }),
      });
      setOutput('added to your list');
      loadItems();
      return true;
    } catch (e) {
      setOutput(e.data || e.message);
      return false;
    } finally {
      importToAccountBtn.disabled = false;
    }
  };

  const autoImportPendingShare = async () => {
    if (!pendingShareCode) return;
    importCodeEl.value = pendingShareCode;
    const added = await importToAccount(pendingShareCode);
    if (added) {
      pendingShareCode = '';
      history.replaceState(null, '', location.pathname);
    }
  };

  importToAccountBtn.addEventListener('click', async () => {
    await importToAccount(importCodeEl.value);
  });

  importCopyBtn.addEventListener('click', async () => {
    if (!lastImportContent) return;
    const old = importCopyBtn.textContent;
    importCopyBtn.textContent = await copyText(lastImportContent) ? 'copied' : 'failed';
    setTimeout(() => { importCopyBtn.textContent = old; }, 1400);
  });

  themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });
  importCodeEl.addEventListener('keydown', e => { if (e.key === 'Enter') importBtn.click(); });

  applyTheme();
  pendingShareCode = normalizeShareCode(shareCodeFromLocation());
  if (pendingShareCode) importCodeEl.value = pendingShareCode;
  refreshMe();
  autoImportPendingShare();
})();
</script>
</body>
</html>
